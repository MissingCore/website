name: Automatic Version Checks
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  checkAppVersions:
    name: Check for current app versions and re-build site if they changed
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.MISSINGCORE_BOT_GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.MISSINGCORE_BOT_GITHUB_TOKEN }}

      - name: Query releases from MissingCore Music
        id: music_versions
        run: |
          MUSIC_LATEST_TAG=$(gh release list \
            --repo MissingCore/Music \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // empty')

          MUSIC_RECENT_TAG=$(gh release list \
            --repo MissingCore/Music \
            --exclude-drafts \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // empty')

          echo "MUSIC_LATEST_TAG=$MUSIC_LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "MUSIC_RECENT_TAG=$MUSIC_RECENT_TAG" >> "$GITHUB_OUTPUT"

          echo "Latest Tag: ${MUSIC_LATEST_TAG:-none}, Most Recent Tag: ${MUSIC_RECENT_TAG:-none}"

      - name: Query releases from MetadataRetriever Package
        id: metadata_retriever_versions
        run: |
          METADATA_RETRIEVER_LATEST_TAG=$(gh release list \
            --repo MissingCore/react-native-metadata-retriever \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // empty')

          METADATA_RETRIEVER_RECENT_TAG=$(gh release list \
            --repo MissingCore/react-native-metadata-retriever \
            --exclude-drafts \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // empty')

          echo "METADATA_RETRIEVER_LATEST_TAG=$METADATA_RETRIEVER_LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "METADATA_RETRIEVER_RECENT_TAG=$METADATA_RETRIEVER_RECENT_TAG" >> "$GITHUB_OUTPUT"

          echo "Latest Tag: ${METADATA_RETRIEVER_LATEST_TAG:-none}, Most Recent Tag: ${METADATA_RETRIEVER_RECENT_TAG:-none}"

      - name: Write versions to `.env.local` file and commit
        run: |
          for tag in \
            "${{ steps.music_versions.outputs.MUSIC_LATEST_TAG }}" \
            "${{ steps.music_versions.outputs.MUSIC_RECENT_TAG }}" \
            "${{ steps.metadata_retriever_versions.outputs.METADATA_RETRIEVER_LATEST_TAG }}" \
            "${{ steps.metadata_retriever_versions.outputs.METADATA_RETRIEVER_RECENT_TAG }}"; do
            if [ -z "$tag" ]; then
              echo "::error::One or more release tags are empty; aborting to avoid corrupting .env.local"
              exit 1
            fi
          done

          echo "PUBLIC_MUSIC_LATEST_TAG=${{ steps.music_versions.outputs.MUSIC_LATEST_TAG }}" > .env.local
          echo "PUBLIC_MUSIC_RECENT_TAG=${{ steps.music_versions.outputs.MUSIC_RECENT_TAG }}" >> .env.local

          echo "PUBLIC_METADATA_RETRIEVER_LATEST_TAG=${{ steps.metadata_retriever_versions.outputs.METADATA_RETRIEVER_LATEST_TAG }}" >> .env.local
          echo "PUBLIC_METADATA_RETRIEVER_RECENT_TAG=${{ steps.metadata_retriever_versions.outputs.METADATA_RETRIEVER_RECENT_TAG }}" >> .env.local

          git config user.name "MissingCore-Bot"
          git config user.email "170483286+MissingCore-Bot@users.noreply.github.com"

          # Commit changes to `.env.local`
          git add .env.local

          # Capture current time and format it (YYYY-MM-DD HH:MM:SS)
          CURRENT_TIME=$(date +"%Y-%m-%d %H:%M:%S")

          if git diff --cached --quiet; then
            echo "No changes to .env.local; nothing to commit."
          else
            git commit -m "[ci] Automatic Version Check $CURRENT_TIME"
            git push
          fi
